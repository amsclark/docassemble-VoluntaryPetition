name: Mend Security Scan

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  schedule:
    - cron: '30 1 * * 0'

jobs:
  mend:
    name: Mend Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.x'

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f setup.py ] || [ -f pyproject.toml ]; then
          pip install -e .
        else
          echo "No setup.py or pyproject.toml found, skipping package installation"
        fi

    - name: Run Mend Unified Agent
      env:
        WS_APIKEY: ${{ secrets.MEND_API_KEY }}
        WS_USERKEY: ${{ secrets.MEND_USER_KEY }}
        WS_PRODUCTNAME: ${{ github.repository }}
        WS_PROJECTNAME: ${{ github.repository }}-${{ github.ref_name }}
        WS_WSS_URL: https://saas.mend.io/agent
      run: |
        curl -LJO https://unified-agent.s3.amazonaws.com/wss-unified-agent.jar
        java -jar wss-unified-agent.jar
